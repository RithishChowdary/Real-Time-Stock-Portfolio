spring.application.name=stockportfolio

# Database Configuration
spring.datasource.url=${DB_URL}
# spring.datasource.url=jdbc:mysql://localhost:3306/stock_portfolio?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8080
spring.jpa.open-in-view=false
# Disable Spring Security default login temporarily
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

jwt.secret=${JWT_SECRET}
# Access token expiry - 7 days
jwt.expiration=604800000
# Refresh token expiry - 30 days
jwt.refresh-expiration=2592000000

twelvedata.api.key=${TWELVEDATA_API_KEY}
twelvedata.base.url=https://api.twelvedata.com

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}

spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

app.upload.research-dir=${RESEARCH_UPLOAD_DIR:uploads/research}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB